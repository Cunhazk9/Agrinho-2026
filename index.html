<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Assistente Técnico Rural - IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Assistente Agro IA 🌾</h1>

            <button onclick="enviarPergunta()">Perguntar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
