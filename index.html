<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Tech - Inteligência Artificial Agrícola</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ícones externos para o design estilo Gemini -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-seedling logo-icon"></i>
            <h2>Agro Tech</h2>
        </div>
        <div class="api-box">
            <label for="apiKeyInput"><i class="fa-solid fa-key"></i> Chave API Gemini:</label>
            <input type="password" id="apiKeyInput" placeholder="Cole sua chave AIzaSy...">
        </div>
        <button class="new-chat-btn" onclick="limparChat()">
            <i class="fa-solid fa-plus"></i> Novo chat
        </button>
        <div class="sidebar-footer">
            <p>v1.5 Flash</p>
        </div>
    </div>

    <div class="main-content">
        <div id="chatContainer" class="chat-container">
            <!-- Tela inicial estilo Gemini -->
            <div id="welcomeScreen" class="welcome-screen">
                <h1>Olá, Produtor.</h1>
                <h2>Como a <span class="brand-text">Agro Tech</span> pode te ajudar hoje?</h2>
                <div class="cards-sugestoes">
                    <div class="card" onclick="sugerirPergunta('Qual a melhor época para plantar milho na minha região?')">
                        <p>Planejar plantio de milho...</p>
                        <i class="fa-solid fa-calendar-days"></i>
                    </div>
                    <div class="card" onclick="sugerirPergunta('Como identificar e tratar a ferrugem asiática na soja?')">
                        <p>Identificar pragas na soja...</p>
                        <i class="fa-solid fa-bug"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area-wrapper">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Digite sua pergunta agrícola aqui..." onkeydown="if(event.key === 'Enter') enviarPergunta()">
                <button id="sendBtn" onclick="enviarPergunta()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <p class="disclaimer">Agro Tech pode cometer erros. Considere verificar informações importantes com um engenheiro agrônomo.</p>
        </div>
    </div>

    <script src="./script.js" defer></script>
</body>
</html>
